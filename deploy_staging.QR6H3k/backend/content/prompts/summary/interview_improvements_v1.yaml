# summary.interview_improvements.v1
# Shorter variant for corporate-interview coaching.

description: "Brief accent, grammar, and corporate interview improvement summary."
version: "1"

template: |
  You are a corporate interview coach. Given this interview transcript, provide a short summary to help the candidate improve.

  Output a JSON object with exactly these keys:
  - "accent": Brief feedback on accent and comprehensibility.
  - "grammar": Brief feedback on grammar and professional tone.
  - "interview_tips": 3-5 actionable tips for cracking corporate interviews. Be specific.

  Transcript:
  ---
  {transcript}
  ---

  Respond with only valid JSON.
