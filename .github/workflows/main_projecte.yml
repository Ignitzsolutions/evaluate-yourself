
name: Build and deploy Python app to Azure Web App - projecte

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Validate production Clerk publishable key
        env:
          REACT_APP_CLERK_PUBLISHABLE_KEY: ${{ secrets.REACT_APP_CLERK_PUBLISHABLE_KEY }}
          ENFORCE_LIVE_CLERK_KEYS: ${{ vars.ENFORCE_LIVE_CLERK_KEYS }}
        run: |
          ENFORCE_LIVE_CLERK_KEYS="${ENFORCE_LIVE_CLERK_KEYS:-false}"
          if [ -z "${REACT_APP_CLERK_PUBLISHABLE_KEY}" ]; then
            echo "❌ Missing REACT_APP_CLERK_PUBLISHABLE_KEY secret"
            exit 1
          fi
          if [[ "${REACT_APP_CLERK_PUBLISHABLE_KEY}" == pk_test_* ]]; then
            if [[ "${ENFORCE_LIVE_CLERK_KEYS}" == "true" ]]; then
              echo "❌ Production deploy cannot use Clerk test publishable key (ENFORCE_LIVE_CLERK_KEYS=true)"
              exit 1
            fi
            echo "⚠️ Using Clerk test publishable key. Set repo variable ENFORCE_LIVE_CLERK_KEYS=true to block this."
          else
            echo "✓ Clerk publishable key looks production-safe"
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install frontend dependencies and build
        env:
          REACT_APP_API_URL: ""
          REACT_APP_CLERK_PUBLISHABLE_KEY: ${{ secrets.REACT_APP_CLERK_PUBLISHABLE_KEY }}
        run: |
          npm ci
          CI=false npm run build

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 🛠️ Local Build Section (Optional)
      # The following section in your workflow is designed to catch build issues early on the client side, before deployment. This can be helpful for debugging and validation. However, if this step significantly increases deployment time and early detection is not critical for your workflow, you may remove this section to streamline the deployment process.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libopenblas-dev \
            libgl1 \
            libglib2.0-0 \
            libavcodec-dev \
            libavformat-dev \
            libswscale-dev

      - name: Create and Start virtual environment and Install dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          # Upgrade pip, setuptools, wheel first (ensures reliable builds)
          pip install --upgrade pip>=24.0 setuptools>=70.0 wheel>=0.41.0
          pip install -r backend/requirements.txt

      - name: Validate imports and app module
        run: |
          source antenv/bin/activate
          python --version
          python -c "import fastapi, uvicorn; print('✓ Core imports successful')"
          python - <<'PY'
          import importlib
          optional = ["cv2", "numpy", "scipy"]
          for name in optional:
            try:
              importlib.import_module(name)
              print(f"✓ Optional import available: {name}")
            except Exception as exc:
              print(f"ℹ Optional import missing: {name} ({exc.__class__.__name__})")
          PY
          python -c "import jwt; print('✓ PyJWT (jwt) import successful')"
          cd backend && python -c "import jwt; import app; print('✓ Backend app module loads successfully (matches startup: cd backend && uvicorn app:app)')"
                
      # By default, when you enable GitHub CI/CD integration through the Azure portal, the platform automatically sets the SCM_DO_BUILD_DURING_DEPLOYMENT application setting to true. This triggers the use of Oryx, a build engine that handles application compilation and dependency installation (e.g., pip install) directly on the platform during deployment. Hence, we exclude the antenv virtual environment directory from the deployment artifact to reduce the payload size. 
      # Note: The artifact includes the entire repo root (.), ensuring backend/ folder exists in deployment
      - name: Verify deployment artifact structure
        run: |
          echo "Verifying backend/ folder exists in artifact..."
          if [ ! -d "backend" ]; then
            echo "❌ ERROR: backend/ folder not found!"
            exit 1
          fi
          if [ ! -f "backend/app.py" ]; then
            echo "❌ ERROR: backend/app.py not found!"
            exit 1
          fi
          echo "✓ backend/ folder verified"
          echo "✓ backend/app.py verified"
          ls -la backend/ | head -10
      
      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !antenv/
            !node_modules/
            !backend/venv/

  deploy:
    runs-on: ubuntu-22.04
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
    

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_8331BDAA4880491C8C40056B471C008E }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_EFD4EDE5F1F74B78B9C871194B590CDB }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_70042E13994748B3806C0F7016364C7B }}

      - name: Ensure startup command
        run: |
          az webapp config set \
            --resource-group projecte_group \
            --name projecte \
            --startup-file "cd backend && gunicorn -k uvicorn.workers.UvicornWorker app:app --bind 0.0.0.0:\${WEBSITES_PORT:-8000} --timeout 600"

      - name: Package deployment artifact
        run: |
          zip -r release.zip . -x "antenv/*" "node_modules/*" "backend/venv/*"

      - name: Deploy to Azure Web App (retry)
        run: |
          for attempt in 1 2 3; do
            echo "Deployment attempt $attempt/3"
            if az webapp deploy \
              --resource-group projecte_group \
              --name projecte \
              --src-path release.zip \
              --type zip \
              --clean true \
              --restart true \
              --track-status true; then
              echo "Deployment succeeded"
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Deployment failed; retrying in 20s..."
              sleep 20
            fi
          done
          echo "Deployment failed after 3 attempts"
          exit 1

      - name: Verify deployed frontend bundle uses live Clerk key
        env:
          ENFORCE_LIVE_CLERK_KEYS: ${{ vars.ENFORCE_LIVE_CLERK_KEYS }}
        run: |
          ENFORCE_LIVE_CLERK_KEYS="${ENFORCE_LIVE_CLERK_KEYS:-false}"
          APP_URL="https://projecte-btcnhqfxfcdahten.southindia-01.azurewebsites.net"
          HTML=$(curl -fsSL "${APP_URL}" || true)
          if [ -z "${HTML}" ]; then
            echo "❌ Unable to fetch deployed app HTML"
            exit 1
          fi
          JS_PATH=$(echo "${HTML}" | grep -oE '/static/js/main[^"]+\.js' | head -n 1)
          if [ -z "${JS_PATH}" ]; then
            echo "❌ Could not locate main JS bundle in deployed HTML"
            exit 1
          fi
          BUNDLE=$(curl -fsSL "${APP_URL}${JS_PATH}" || true)
          if [ -z "${BUNDLE}" ]; then
            echo "❌ Could not fetch deployed JS bundle"
            exit 1
          fi
          if echo "${BUNDLE}" | grep -q "pk_test_"; then
            if [[ "${ENFORCE_LIVE_CLERK_KEYS}" == "true" ]]; then
              echo "❌ Deployed frontend bundle still contains Clerk test key (ENFORCE_LIVE_CLERK_KEYS=true)"
              exit 1
            fi
            echo "⚠️ Deployed frontend bundle contains Clerk test key."
            exit 0
          fi
          echo "✓ Deployed frontend bundle does not contain Clerk test key"
          
