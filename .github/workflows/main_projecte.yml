
name: CI and deploy to server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: read #This is required for actions/checkout
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install frontend dependencies and build
        env:
          REACT_APP_API_URL: ""
          REACT_APP_INTERVIEW_ACCESS_MODE: "free"
        run: |
          npm ci
          CI=true npm test -- --runInBand --watch=false src/pages/__tests__/PreInterviewForm.test.jsx src/pages/__tests__/ReportPage.test.jsx src/components/__tests__/OnboardingGuard.test.jsx src/pages/__tests__/AdminEntryPage.test.jsx
          CI=false npm run build

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libopenblas-dev \
            libgl1 \
            libglib2.0-0 \
            libavcodec-dev \
            libavformat-dev \
            libswscale-dev

      - name: Sync Python dependencies with uv
        run: |
          uv sync --frozen

      - name: Check Python formatting
        run: |
          uv run black --check \
            backend/services/auth \
            backend/services/interview/scoring_service.py \
            backend/scripts \
            backend/tests/test_schema_smoke.py \
            backend/tests/test_auth_migration_smoke.py \
            backend/tests/test_interview_orchestration_backend.py \
            backend/tests/test_replay_payload.py \
            backend/tests/test_provider_adapter.py \
            backend/tests/test_user_contact_sync.py

      - name: Run mypy on cleaned service modules
        run: |
          uv run mypy

      - name: Validate imports and app module
        run: |
          python --version
          uv run python -c "import fastapi, uvicorn; print('✓ Core imports successful')"
          uv run python - <<'PY'
          import importlib
          optional = ["cv2", "numpy", "scipy"]
          for name in optional:
            try:
              importlib.import_module(name)
              print(f"✓ Optional import available: {name}")
            except Exception as exc:
              print(f"ℹ Optional import missing: {name} ({exc.__class__.__name__})")
          PY
          uv run python -c "import jwt; print('✓ PyJWT (jwt) import successful')"
          cd backend && uv run python -c "import jwt; import app; print('✓ Backend app module loads successfully (matches startup: cd backend && uvicorn app:app)')"

      - name: Run targeted backend release checks
        run: |
          uv run pytest -q \
            backend/tests/test_schema_smoke.py \
            backend/tests/test_auth_migration_smoke.py \
            backend/tests/test_interview_orchestration_backend.py \
            backend/tests/test_replay_payload.py \
            backend/tests/test_provider_adapter.py

      - name: Run backend startup smoke against live local app
        env:
          DATABASE_URL: sqlite:///${{ github.workspace }}/backend/ci-startup-smoke.db
          REDIS_URL: redis://127.0.0.1:6379/0
          JWT_SECRET_KEY: ci-startup-smoke-secret-at-least-32-chars
          OPENAI_API_KEY: ci-startup-smoke-key
        run: |
          rm -f "${{ github.workspace }}/backend/ci-startup-smoke.db"
          uv run python -m alembic -c backend/alembic.ini upgrade head
          cd backend
          PYTHONPATH=. uv run uvicorn app:app --host 127.0.0.1 --port 8000 > ../backend-smoke.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null; then
              break
            fi
            sleep 2
          done
          cd ..
          uv run python backend/scripts/startup_smoke.py --base-url http://127.0.0.1:8000
                
      - name: Verify deployment artifact structure
        run: |
          echo "Verifying backend/ folder exists in artifact..."
          if [ ! -d "backend" ]; then
            echo "❌ ERROR: backend/ folder not found!"
            exit 1
          fi
          if [ ! -f "backend/app.py" ]; then
            echo "❌ ERROR: backend/app.py not found!"
            exit 1
          fi
          echo "✓ backend/ folder verified"
          echo "✓ backend/app.py verified"
          ls -la backend/ | head -10

      - name: Validate Docker Compose deployment config
        run: |
          docker compose config

      - name: Package release bundle
        run: |
          tar \
            --exclude=.git \
            --exclude=.github \
            --exclude=.venv \
            --exclude=node_modules \
            --exclude=backend/venv \
            --exclude=test-results \
            --exclude=.playwright-cli \
            -czf release.tar.gz .

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: release.tar.gz

  deploy-via-ssh:
    runs-on: ubuntu-22.04
    needs: build
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: release-bundle

      - name: Validate deploy secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_ENV_FILE: ${{ secrets.DEPLOY_ENV_FILE }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
        run: |
          for name in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY DEPLOY_PATH DEPLOY_ENV_FILE APP_BASE_URL; do
            if [ -z "${!name}" ]; then
              echo "Missing required deploy secret: ${name}"
              exit 1
            fi
          done
          if [ -z "${DEPLOY_PORT}" ]; then
            echo "DEPLOY_PORT not set; defaulting to 22"
          fi

      - name: Prepare SSH client
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${DEPLOY_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${DEPLOY_PORT:-22}" -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Upload release bundle and deploy assets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_ENV_FILE: ${{ secrets.DEPLOY_ENV_FILE }}
        run: |
          printf '%s\n' "${DEPLOY_ENV_FILE}" > backend.env
          scp -P "${DEPLOY_PORT:-22}" release.tar.gz backend.env deploy/server/remote-deploy.sh "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/"

      - name: Deploy release on server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" "chmod +x /tmp/remote-deploy.sh && /tmp/remote-deploy.sh /tmp/release.tar.gz /tmp/backend.env '${DEPLOY_PATH}'"

      - name: Smoke check deployed app routes
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
        run: |
          chmod +x deploy/server/post-deploy-smoke.sh
          ./deploy/server/post-deploy-smoke.sh "${APP_BASE_URL}"

      - name: Run hosted Sonia certification
        env:
          PW_CERT_BASE_URL: ${{ secrets.APP_BASE_URL }}
          PW_CERT_SESSION_URL: ${{ secrets.PW_CERT_SESSION_URL }}
          PW_CERT_STORAGE_STATE_JSON: ${{ secrets.PW_CERT_STORAGE_STATE_JSON }}
        run: |
          if [ -z "${PW_CERT_SESSION_URL}" ]; then
            echo "Skipping hosted Sonia certification because PW_CERT_SESSION_URL is not configured"
            exit 0
          fi
          STORAGE_STATE_PATH="${RUNNER_TEMP}/pw-cert-storage-state.json"
          if [ -n "${PW_CERT_STORAGE_STATE_JSON}" ]; then
            printf '%s' "${PW_CERT_STORAGE_STATE_JSON}" > "${STORAGE_STATE_PATH}"
          else
            printf '{}' > "${STORAGE_STATE_PATH}"
          fi
          npm install
          npx playwright install --with-deps chromium
          PW_CERT_STORAGE_STATE="${STORAGE_STATE_PATH}" xvfb-run -a npm run test:e2e:hosted
          
