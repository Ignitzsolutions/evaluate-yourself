
name: Build and deploy Python app to Azure Web App - projecte

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Validate production JWT secret
        env:
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
        run: |
          if [ -z "${JWT_SECRET_KEY}" ]; then
            echo "❌ Missing JWT_SECRET_KEY secret"
            exit 1
          fi
          if [ ${#JWT_SECRET_KEY} -lt 32 ]; then
            echo "❌ JWT_SECRET_KEY must be at least 32 characters"
            exit 1
          fi
          echo "✓ JWT_SECRET_KEY is set and meets minimum length"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install frontend dependencies and build
        env:
          REACT_APP_API_URL: ""
          REACT_APP_INTERVIEW_ACCESS_MODE: "free"
        run: |
          npm ci
          CI=true npm test -- --runInBand --watch=false src/pages/__tests__/PreInterviewForm.test.jsx src/pages/__tests__/ReportPage.test.jsx src/components/__tests__/OnboardingGuard.test.jsx src/pages/__tests__/AdminEntryPage.test.jsx
          CI=false npm run build

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 🛠️ Local Build Section (Optional)
      # The following section in your workflow is designed to catch build issues early on the client side, before deployment. This can be helpful for debugging and validation. However, if this step significantly increases deployment time and early detection is not critical for your workflow, you may remove this section to streamline the deployment process.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libopenblas-dev \
            libgl1 \
            libglib2.0-0 \
            libavcodec-dev \
            libavformat-dev \
            libswscale-dev

      - name: Create and Start virtual environment and Install dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          # Upgrade pip, setuptools, wheel first (ensures reliable builds)
          pip install --upgrade pip>=24.0 setuptools>=70.0 wheel>=0.41.0
          pip install -r backend/requirements.txt

      - name: Run mypy on cleaned service modules
        run: |
          source antenv/bin/activate
          pip install mypy
          cd backend
          mypy --ignore-missing-imports services/auth/ services/interview/scoring_service.py

      - name: Validate imports and app module
        run: |
          source antenv/bin/activate
          python --version
          python -c "import fastapi, uvicorn; print('✓ Core imports successful')"
          python - <<'PY'
          import importlib
          optional = ["cv2", "numpy", "scipy"]
          for name in optional:
            try:
              importlib.import_module(name)
              print(f"✓ Optional import available: {name}")
            except Exception as exc:
              print(f"ℹ Optional import missing: {name} ({exc.__class__.__name__})")
          PY
          python -c "import jwt; print('✓ PyJWT (jwt) import successful')"
          cd backend && python -c "import jwt; import app; print('✓ Backend app module loads successfully (matches startup: cd backend && uvicorn app:app)')"

      - name: Run targeted backend release checks
        run: |
          source antenv/bin/activate
          pytest -q \
            backend/tests/test_interview_orchestration_backend.py \
            backend/tests/test_replay_payload.py \
            backend/tests/test_provider_adapter.py

      - name: Run backend startup smoke against live local app
        run: |
          source antenv/bin/activate
          cd backend
          PYTHONPATH=. uvicorn app:app --host 127.0.0.1 --port 8000 > ../backend-smoke.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null; then
              break
            fi
            sleep 2
          done
          cd ..
          python backend/scripts/startup_smoke.py --base-url http://127.0.0.1:8000
                
      # By default, when you enable GitHub CI/CD integration through the Azure portal, the platform automatically sets the SCM_DO_BUILD_DURING_DEPLOYMENT application setting to true. This triggers the use of Oryx, a build engine that handles application compilation and dependency installation (e.g., pip install) directly on the platform during deployment. Hence, we exclude the antenv virtual environment directory from the deployment artifact to reduce the payload size. 
      # Note: The artifact includes the entire repo root (.), ensuring backend/ folder exists in deployment
      - name: Verify deployment artifact structure
        run: |
          echo "Verifying backend/ folder exists in artifact..."
          if [ ! -d "backend" ]; then
            echo "❌ ERROR: backend/ folder not found!"
            exit 1
          fi
          if [ ! -f "backend/app.py" ]; then
            echo "❌ ERROR: backend/app.py not found!"
            exit 1
          fi
          echo "✓ backend/ folder verified"
          echo "✓ backend/app.py verified"
          ls -la backend/ | head -10
      
      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !antenv/
            !node_modules/
            !backend/venv/

  deploy:
    runs-on: ubuntu-22.04
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
    

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_8331BDAA4880491C8C40056B471C008E }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_EFD4EDE5F1F74B78B9C871194B590CDB }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_70042E13994748B3806C0F7016364C7B }}

      - name: Validate required Azure app settings
        run: |
          SETTINGS_JSON=$(az webapp config appsettings list \
            --resource-group projecte_group \
            --name projecte \
            --output json)
          export SETTINGS_JSON
          python3 - <<'PY'
          import json
          import os
          import sys

          settings = {
              item.get("name"): str(item.get("value") or "").strip()
              for item in json.loads(os.environ["SETTINGS_JSON"])
          }
          missing = [
              key for key in (
                  "DATABASE_URL",
                  "REDIS_URL",
                  "ALLOWED_ORIGINS",
                  "JWT_SECRET_KEY",
              )
              if not settings.get(key)
          ]
          if missing:
              print(f"Missing Azure app settings: {', '.join(missing)}", file=sys.stderr)
              sys.exit(1)
          print("✓ Required Azure app settings are present")
          PY

      - name: Set demo access defaults
        run: |
          az webapp config appsettings set \
            --resource-group projecte_group \
            --name projecte \
            --settings \
              INTERVIEW_ACCESS_MODE=free \
              TRIAL_MODE_ENABLED=false \
              TRIAL_CODE_ENFORCEMENT=false

      - name: Ensure startup command
        run: |
          az webapp config set \
            --resource-group projecte_group \
            --name projecte \
            --startup-file "cd backend && gunicorn -k uvicorn.workers.UvicornWorker app:app --bind 0.0.0.0:\${WEBSITES_PORT:-8000} --timeout 600"

      - name: Package deployment artifact
        run: |
          zip -r release.zip . -x "antenv/*" "node_modules/*" "backend/venv/*"

      - name: Deploy to Azure Web App (retry)
        run: |
          for attempt in 1 2 3; do
            echo "Deployment attempt $attempt/3"
            if az webapp deploy \
              --resource-group projecte_group \
              --name projecte \
              --src-path release.zip \
              --type zip \
              --clean true \
              --restart true \
              --track-status true; then
              echo "Deployment succeeded"
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Deployment failed; retrying in 20s..."
              sleep 20
            fi
          done
          echo "Deployment failed after 3 attempts"
          exit 1

      - name: Smoke check deployed app routes
        run: |
          APP_URL="https://projecte-btcnhqfxfcdahten.southindia-01.azurewebsites.net"

          check_route() {
            local path="$1"
            local accepted_codes="$2"
            local url="${APP_URL}${path}"
            local code
            code=$(curl -sS -o /tmp/deploy_route_check.out -w "%{http_code}" "${url}" || true)
            for expected in ${accepted_codes}; do
              if [ "${code}" = "${expected}" ]; then
                echo "✓ ${path} -> ${code}"
                return 0
              fi
            done
            echo "❌ ${path} -> ${code} (expected one of: ${accepted_codes})"
            head -c 200 /tmp/deploy_route_check.out || true
            echo ""
            exit 1
          }

          check_route "/" "200"
          check_route "/health" "200"
          check_route "/favicon.ico" "200 301 302 304"

      - name: Run hosted Sonia certification
        env:
          PW_CERT_BASE_URL: "https://projecte-btcnhqfxfcdahten.southindia-01.azurewebsites.net"
          PW_CERT_SESSION_URL: ${{ secrets.PW_CERT_SESSION_URL }}
          PW_CERT_STORAGE_STATE_JSON: ${{ secrets.PW_CERT_STORAGE_STATE_JSON }}
        run: |
          if [ -z "${PW_CERT_SESSION_URL}" ]; then
            echo "❌ Missing PW_CERT_SESSION_URL secret for hosted Sonia certification"
            exit 1
          fi
          if [ -z "${PW_CERT_STORAGE_STATE_JSON}" ]; then
            echo "❌ Missing PW_CERT_STORAGE_STATE_JSON secret for hosted Sonia certification"
            exit 1
          fi
          STORAGE_STATE_PATH="${RUNNER_TEMP}/pw-cert-storage-state.json"
          printf '%s' "${PW_CERT_STORAGE_STATE_JSON}" > "${STORAGE_STATE_PATH}"
          npm install
          npx playwright install --with-deps chromium
          PW_CERT_STORAGE_STATE="${STORAGE_STATE_PATH}" npm run test:e2e:hosted
          
